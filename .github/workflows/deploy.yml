name: Deploy to rwherber.com

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two production deploys at once.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          TARGET: /var/www/html
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes"
          # Purge only our own hashed bundles so they don't accumulate.
          # Legacy sub-projects (Fireheart, entropy, another-clue, APIs, ...) are left untouched.
          $SSH "$USER@$HOST" "rm -rf $TARGET/assets"
          # Sync the build WITHOUT --delete so unrelated files on the server are preserved.
          rsync -az --no-perms --no-owner --no-group \
            -e "$SSH" \
            ./dist/ "$USER@$HOST:$TARGET/"
